projects:
  vrstbackoffice-prod:
    schemaPath: src/graphql/schema.json
    includes:
      - src/graphql/**/*.js
    excludes:
      - ./amplify/**
    extensions:
      amplify:
        codeGenTarget: javascript
        generatedFileName: ''
        docsFilePath: src/graphql
        region: ap-northeast-1
        apiId: 2xm4ixwpvjfgzcv7vpjguktn6a
        maxDepth: 2
extensions:
  amplify:
    version: 3
